name: Update StackTracker

# Self-updating intelligence product: recompute the momentum index from live
# GitHub signals every day, commit the new data.json, and redeploy to Vercel.
on:
  schedule:
    - cron: "17 9 * * *"   # 09:17 UTC daily
  workflow_dispatch: {}      # allow manual runs

permissions:
  contents: write

# Note: the commit below pushes with the default GITHUB_TOKEN, which by design
# does NOT retrigger workflows — so there is no push→workflow loop. Do not add a
# `push:` trigger to this workflow, or that guarantee breaks.

concurrency:
  group: update
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Recompute data.json from GitHub signals
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python build_data.py

      - name: Commit data if changed
        run: |
          git config user.name  "stacktracker-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet -- data.json; then
            git add data.json
            git commit -m "data: daily momentum refresh ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No data change."
          fi

      - name: Deploy to Vercel
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: python deploy.py
      - name: Ping IndexNow
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: python indexnow_ping.py
